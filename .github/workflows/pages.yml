name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build demo bundle
        run: npm run build:demo

      # Cache-bust the bundle URL with the commit SHA so browsers never serve a
      # stale index.global.js after a deploy.
      - name: Version the demo bundle URL
        run: sed -i "s|index.global.js|index.global.js?v=${GITHUB_SHA}|g" demo/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo

      - id: deployment
        uses: actions/deploy-pages@v4
